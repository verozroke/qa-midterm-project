# setup.cfg — mutmut configuration.
# Place this in the project root (or reference via --config).
# Targets the high-risk modules identified in the midterm risk analysis:
# authentication, validation, and ticket CRUD.

[mutmut]
paths_to_mutate = app/main.py
runner = python -m pytest tests/unit/ tests/api/ -x -q --tb=no
tests_dir = tests/
backup = False
# skip lines that are pure imports / trivial boilerplate — mutmut does this
# heuristically but we constrain to the code we actually care about.
