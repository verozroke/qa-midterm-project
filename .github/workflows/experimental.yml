name: Experimental Testing (Assignment 3)

# Runs Performance / Mutation / Chaos tests.
#
# Triggers:
#   - push to main/master/develop touching app, tests, or experimental code
#   - pull_request into those branches
#   - manual dispatch from the Actions tab
#   - push of a tag matching experimental-*
#
# Opt-out: include "[skip-experimental]" in any commit message to skip the
# whole job — useful for docs-only commits where the ~20-minute run is
# wasteful.

on:
  push:
    branches: [main, master, develop]
    paths:
      - "app/**"
      - "tests/**"
      - "experimental/**"
      - ".github/workflows/experimental.yml"
    tags:
      - "experimental-*"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "experimental/**"
  workflow_dispatch:
    inputs:
      run_performance:
        description: "Run performance tests (Locust)"
        type: boolean
        default: true
      run_mutation:
        description: "Run mutation tests"
        type: boolean
        default: true
      run_chaos:
        description: "Run chaos tests"
        type: boolean
        default: true

jobs:
  experimental:
    if: ${{ !contains(github.event.head_commit.message, '[skip-experimental]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_BASE_URL: "http://localhost:8080"
      TEST_USERNAME: "test.user"
      TEST_PASSWORD: "ChangeMe123!"
      DATABASE_PATH: "tickets.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r experimental/requirements-experimental.txt

      # ── 1. MUTATION TESTING ────────────────────────────────────────
      # Runs first because it's self-contained (starts/stops the app itself).
      # If the suite is broken, fail fast instead of burning time on
      # performance + chaos.
      - name: Mutation testing
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mutation != false }}
        run: python experimental/mutation/custom_mutation.py --manage-app

      # ── 2. START APP for perf + chaos ──────────────────────────────
      - name: Start app server
        run: |
          python -m app.main > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          sleep 3
          curl -sf http://localhost:8080/api/health > /dev/null && echo "✓ app up"

      # ── 3. PERFORMANCE (Locust — no k6 install needed) ────────────
      - name: Performance — normal load
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_performance != false }}
        working-directory: experimental/performance/locust
        run: |
          mkdir -p ../results
          locust -f locustfile.py --headless -u 20 -r 10 -t 45s \
            --host http://localhost:8080 --csv=../results/normal

      - name: Performance — peak load
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_performance != false }}
        working-directory: experimental/performance/locust
        run: |
          locust -f locustfile.py --headless -u 100 -r 20 -t 60s \
            --host http://localhost:8080 --csv=../results/peak

      - name: Performance — spike load
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_performance != false }}
        working-directory: experimental/performance/locust
        run: |
          locust -f locustfile.py --headless -u 200 -r 100 -t 30s \
            --host http://localhost:8080 --csv=../results/spike

      # ── 4. CHAOS ───────────────────────────────────────────────────
      # --skip-api-kill: CI already manages the process lifecycle, so do NOT
      # let the runner kill and restart the app under itself.
      - name: Chaos testing
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_chaos != false }}
        run: python experimental/chaos/chaos_runner.py --skip-api-kill

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill $(cat /tmp/app.pid) 2>/dev/null || true
          fi

      # ── 5. UPLOAD RESULTS as a downloadable artifact ───────────────
      - name: Upload experimental results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-results-${{ github.run_number }}
          path: |
            experimental/performance/results/
            experimental/mutation/results/
            experimental/chaos/results/
          retention-days: 30

      # Print compact summary to the Actions log so results are visible
      # without downloading the artifact.
      - name: Summary
        if: always()
        run: |
          echo "=== Mutation Summary ==="
          python -c "import json; d=json.load(open('experimental/mutation/results/mutation_report.json')); print(json.dumps(d['summary'], indent=2))" || echo "no mutation data"
          echo ""
          echo "=== Chaos Summary ==="
          python -c "import json; d=json.load(open('experimental/chaos/results/chaos_report.json')); print(json.dumps(d['summary'], indent=2))" || echo "no chaos data"
          echo ""
          echo "=== Performance Summary (aggregated rows) ==="
          for f in experimental/performance/results/*_stats.csv; do
            echo "--- $f ---"
            tail -n 1 "$f"
          done
