<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ticket System{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
    nav { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #a0aec0; text-decoration: none; margin-left: 16px; }
    nav a:hover { color: #fff; }
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 16px; }
    h1, h2 { margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input[type="text"], input[type="password"], textarea, select {
      width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px;
    }
    textarea { min-height: 100px; resize: vertical; }
    button[type="submit"], .btn { background: #4361ee; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button[type="submit"]:hover, .btn:hover { background: #3a56d4; }
    .alert-danger { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    .alert-success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-open { background: #dbeafe; color: #1e40af; }
    .badge-closed { background: #f3f4f6; color: #6b7280; }
    .badge-high, .badge-critical { background: #fee2e2; color: #991b1b; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-low { background: #d1fae5; color: #065f46; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
    th { background: #f7fafc; font-weight: 600; }
    .notification-badge { background: #ef4444; color: #fff; border-radius: 50%; padding: 2px 7px; font-size: 11px; margin-left: 4px; }
    .notif-item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
