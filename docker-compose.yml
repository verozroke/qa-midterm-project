version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/data/tickets.db
      - SECRET_KEY=change-me-in-production
      - PORT=8080
    volumes:
      - db-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
